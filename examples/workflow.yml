# Save this as `.github/workflows/repo-assistant.yml` in the repo where you want
# the bot to run. Set the two required secrets in
# Settings → Secrets and variables → Actions:
#   - OPENAI_API_KEY   (or any OpenAI-compatible gateway key)
#   - DATABASE_URL     (Postgres + pgvector — Neon recommended, see README)
name: repo-assistant

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  # Auto-close sweep — runs every 6 hours over open `duplicate` /
  # `possible-duplicate` issues. Remove this trigger if you don't want auto-close.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: guillermoscript/repo-assistant@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          database-url: ${{ secrets.DATABASE_URL }}

  auto-close:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: guillermoscript/repo-assistant@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          database-url: ${{ secrets.DATABASE_URL }}
          mode: auto-close
          # Flip this to 'true' once you've watched a few dry-run cycles.
          auto-close-enabled: "false"
          auto-close-dry-run: "true"
