# Self-test of the repo-assistant Action — dogfood on its own repo.
# Uses the local checkout (`uses: ./`) instead of the @v1 tag so this exercises
# the current commit's bundle. Switch to `uses: guillermoscript/repo-assistant@v1`
# in your own repo (see examples/workflow.yml).
name: Auto-close confirmed duplicates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log decisions without closing"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      grace_hours:
        description: "Override grace period in hours"
        required: false
        type: string

permissions:
  issues: write
  contents: read

jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          database-url: ${{ secrets.DATABASE_URL }}
          mode: auto-close
          auto-close-enabled: ${{ vars.AUTO_CLOSE_ENABLED || 'false' }}
          auto-close-dry-run: ${{ inputs.dry_run || 'true' }}
          auto-close-grace-hours: ${{ inputs.grace_hours || vars.AUTO_CLOSE_GRACE_HOURS || '72' }}
